spring:
  config:
    import: "configserver:http://localhost:7777"

server:
  port: 8091

eureka:
  instance:
    hostname: host.docker.internal
    prefer-ip-address: false
    instance-id: "${spring.application.name}:${server.port}"

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/