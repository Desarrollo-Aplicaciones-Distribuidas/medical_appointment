spring:
  application:
    name: medical-appointment

  profiles:
    default: default

  config:
    # Para ejecución local podrías usar:
    # import: "configserver:http://localhost:7777"

    # Para Docker / variables de entorno:
    import: "optional:configserver:${CONFIG_SERVER_HOST}"

  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}

    hikari:
      maximum-pool-size: ${db.maximum-pool-size}
      connection-timeout: ${db.connection-timeout}

    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org:
      hibernate:
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
        SQL: DEBUG

server:
  servlet:
    context-path: /medical-appointment
  port: 8088

eureka:
  instance:
    instance-id: "${spring.application.name}:${random.value}"

  client:
    service-url:
      # Para ejecución local podrías usar:
      # defaultZone: http://localhost:8761/eureka/

      # Para Docker / variables de entorno:
      defaultZone: ${EUREKA_URL}