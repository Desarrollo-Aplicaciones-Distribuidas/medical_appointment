spring:
  application:
    name: medical-appointment
  profiles:
    default: default
  config:
    import: "configserver:http://config-server:7777"
  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
    hikari:
      maximum-pool-size: ${db.maximum-pool-size}
      connection-timeout: ${db.connection-timeout}
    initialization-mode: always

    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: 'true'
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: 'true'
logging:
  level:
    org:
      hibernate:
        sql: debug
server:
  servlet:
    context-path: /medical-appointment
  #  port: ${PORT:0}
  port: 8088
eureka:
  instance:
    instance-id: "${spring.application.name}:${random.value}"
  client:
    service-url:
      defaultZone: http://registry-server:8761/eureka/